[api]
jwt_secret = "devsecret"
port = 8080

[roles]
# A node is one binary that runs any subset of these roles. Toggle them to compose a
# deployment: all-on for single-node, api-only for a control plane, worker-only for an
# execution fleet. Each is also settable via env (ARBITER_ROLES_API=false, etc).
api = true
scheduler = true
worker = true

[database]
url = "postgres://arbiter:arbiter@localhost:2345/arbiter"

[admin]
username = "admin"
password = "admin"

[retention]
# Keep terminal runs (succeeded/failed/cancelled) for this many days; the leader
# prunes older ones. 0 = keep forever (disabled). Active runs are never pruned.
run_retention_days = 0
# How often the leader runs a retention prune.
prune_interval_secs = 3600

[scheduler]
# Max look-back for misfire catch-up after downtime. 0 = disabled (only future fires
# materialize). Per-job misfire_policy refines behavior within this window.
misfire_catchup_secs = 0