[api]
jwt_secret = "devsecret"
port = 8080

[roles]
# A node is one binary that runs any subset of these roles. Toggle them to compose a
# deployment: all-on for single-node, api-only for a control plane, worker-only for an
# execution fleet. Each is also settable via env (ARBITER_ROLES_API=false, etc).
api = true
scheduler = true
worker = true

[node]
# Where the node persists its identity file. Default /data; set to a writable path
# (e.g. ./.dev/data) when running without root. Also settable via ARBITER_DATA_DIR.
data_dir = "/data"
# The node's crypto identity keyring file (ARBITER_NODE_IDENTITY).
identity_path = "node_identity.json"
# Allow several node processes on one host to take distinct identities
# (ARBITER_ALLOW_MULTI_ID). Off by default.
allow_multi_id = false

[database]
url = "postgres://arbiter:arbiter@localhost:2345/arbiter"

[admin]
username = "admin"
password = "admin"

[retention]
# Keep terminal runs (succeeded/failed/cancelled) for this many days; the leader
# prunes older ones. 0 = keep forever (disabled). Active runs are never pruned.
run_retention_days = 0
# How often the leader runs a retention prune.
prune_interval_secs = 3600

[scheduler]
# Max look-back for misfire catch-up after downtime. 0 = disabled (only future fires
# materialize). Per-job misfire_policy refines behavior within this window.
misfire_catchup_secs = 0
# Leader bounded-sleep cap (seconds): the scheduler sleeps until the next fire but at
# most this long, waking immediately on a job change in between. 0 = no bound (sleep to
# the next fire, relying on change notifications). Default 180.
backstop_secs = 180